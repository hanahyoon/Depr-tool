function parseDate(r){
  if(!r||r==="0"||String(r).trim()==="")return null;
  const s=String(r).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{4}-\d{2}$/.test(s))return s+"-01";
  const n=parseFloat(s);
  if(!isNaN(n)&&n>40000&&n<60000){const d=new Date(Math.round((n-25569)*86400*1000));if(!isNaN(d.getTime()))return d.toISOString().slice(0,10);}
  return null;
}

function parseZFA(rows){
  if(!rows.length)return[];
  const rk=Object.keys(rows[0]);
  const nm=k=>k.toLowerCase().replace(/[\s.\-_/]/g,"");
  const cm={};rk.forEach(k=>{cm[nm(k)]=k;});
  const fk=(...ps)=>{for(const p of ps){if(cm[p])return cm[p];}for(const p of ps){const f=Object.keys(cm).find(k=>k.includes(p));if(f)return cm[f];}return null;};
  const K={cocd:fk("cocd","companycode"),acct:fk("acctdet","acct"),class:fk("class"),asset:fk("asset"),name:fk("assetdescriptio","assetdesc"),cc:fk("costctr","costcenter"),acqval:fk("currentacqva","currentacqval","acqval"),deact:fk("deactdate","deact"),capdate:fk("capdate","capitalizedon")};
  const res=[];
  for(const row of rows){
    const g=k=>k?String(row[k]??"").trim():"";
    if(g(K.cocd)!=="7070")continue;
    const acct=g(K.acct);if(!/^16\d{4}$/.test(acct))continue;
    const asset=g(K.asset).replace(/^0+/,"").padStart(6,"0");if(!/^\d{6}$/.test(asset))continue;
    const acqUSD=parseFloat(g(K.acqval).replace(/,/g,""))||0;
    const acqKRW=Math.round(acqUSD*100);
    const life=CLASS_LIFE[g(K.class)]||4;
    const capDate=parseDate(g(K.capdate));
    const monthly=(acqKRW>0&&capDate)?Math.round(acqKRW/(life*12)):0;
    const retireDate=parseDate(g(K.deact));
    res.push({asset,acct,cc:g(K.cc),name:g(K.name),capDate:capDate||"",monthly,retireDate,acqKRW,life});
  }
  return res;
}

function parseTestRun(rows){
  const res=[];
  for(const row of rows){
    const vals=Object.values(row).map(v=>String(v??"").trim());
    const ai=vals.findIndex(v=>/^\d{6}$/.test(v));if(ai<0)continue;
    const asset=vals[ai];
    const acct=vals.find(v=>/^16\d{4}$/.test(v))||"";
    const cc=vals.find(v=>/^7070\d{4}$/.test(v))||"";
    const ledger=vals.find(v=>v==="0L"||v==="ST")||"";
    const amtRaw=vals.find(v=>/^-[\d,]+$/.test(v.replace(/\s/g,"")));
    const amt=amtRaw?parseInt(amtRaw.replace(/,/g,"")):null;
    const li=vals.indexOf(ledger);
    const name=(li>=0&&vals[li+1])?vals[li+1]:"";
    if(asset&&ledger&&amt!==null)res.push({asset,acct,cc,ledger,amt,name});
  }
  return res;
}

async function readExcel(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:"array"});let rows=[];for(const sn of wb.SheetNames)rows=rows.concat(XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:""}));res(rows);}catch(e){rej(e);}};
    r.onerror=rej;r.readAsArrayBuffer(file);
  });
}

      const body=JSON.stringify(content,null,2);

            E("div",{key:s.asset,onClick:()=>setRetireForm(f=>({...f,asset:s.asset})),style:{padding:"7px 9px",borderRadius:5,cursor:"pointer",marginBottom:3,background:retireForm.asset===s.asset?"#e3f2fd":"#f9fafb",border:"1px solid "+(retireForm.asset===s.asset?"#1565c0":"#eee")}},
              E("div",{style:{fontFamily:"monospace",fontWeight:600,color:"#1a3a5c",fontSize:11}},s.asset),
              E("div",{style:{fontSize:10,color:"#666",marginTop:1}},s.name)
            )
          )
        )
      )
    ),

    // ── 설정 ──
    activeTab==="settings"&&E("div",{style:{maxWidth:480}},
      E("div",{style:{...card,padding:20}},
        E("div",{style:{fontWeight:700,fontSize:14,marginBottom:4,color:"#1a3a5c"}},"⚙️ GitHub 연동 설정"),
        E("div",{style:{fontSize:11,color:"#666",marginBottom:14,padding:"8px 11px",background:"#fff8e1",borderRadius:6,lineHeight:1.6}},
          "⚠️ 이 설정은 Hanah(관리자)만 입력하세요. 팀원들은 설정 불필요.",E("br",null),
          "Token은 이 기기 localStorage에만 저장됩니다."
        ),
        E("div",{style:{display:"flex",flexDirection:"column",gap:9}},
          E("div",{style:{display:"flex",flexDirection:"column",gap:3}},
            E("label",{style:{fontSize:11,color:"#555",fontWeight:600}},"GitHub Personal Access Token"),
            E("input",{type:"password",value:ghToken,onChange:e=>setGhToken(e.target.value),placeholder:"ghp_xxxxxxxxxxxxxxxxxxxx",style:{padding:"7px 9px",border:"1px solid #d0d7e0",borderRadius:5,fontSize:11,fontFamily:"monospace"}})
          ),
          E("button",{onClick:async()=>{if(!ghToken){alert("Token을 입력해주세요");return;}await storage.set("ghToken",ghToken);setIsAdmin(true);setGhMsg("✅ Token 저장 완료! ZFA 동기화 시 자동으로 GitHub에 업데이트됩니다.");},style:{padding:"9px",background:"#1a3a5c",color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:700,cursor:"pointer"}},"Token 저장"),
          isAdmin&&E("div",{style:{padding:"7px 11px",background:"#e8f5e9",borderRadius:5,fontSize:11,color:"#2e7d32"}},"✅ 관리자 모드 활성화 — ZFA 동기화 시 자동으로 팀원들과 공유됩니다"),
          E(MsgBox,{msg:ghMsg})
        ),
        E("div",{style:{marginTop:18,padding:"12px",background:"#f0f4f8",borderRadius:7,fontSize:11,color:"#555",lineHeight:1.7}},
          E("div",{style:{fontWeight:600,marginBottom:4}},"📌 팀원 공유 URL"),
          E("div",{style:{padding:"5px 9px",background:"#1a3a5c",color:"#fff",borderRadius:4,fontFamily:"monospace",fontSize:10,wordBreak:"break-all"}},"https://hanahyoon.github.io/Depr-tool"),
          E("div",{style:{marginTop:5,color:"#888",fontSize:10}},"팀원들은 이 URL 접속만 하면 최신 데이터와 변동 현황을 볼 수 있어요.")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
